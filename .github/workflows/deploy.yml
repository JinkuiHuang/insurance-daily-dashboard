name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        run: |
          set -e
          ACCOUNT_ID="54a09ae3b4bbd21e7bf04cf436e6145a"
          PROJECT="insurance-daily-dashboard"
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"

          # Verify token first
          echo "Testing token..."
          HTTP_TEST=$(curl -s -o /tmp/test.json -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects/${PROJECT}")
          echo "API test HTTP: ${HTTP_TEST}"
          if [ "${HTTP_TEST}" != "200" ]; then
            cat /tmp/test.json
            exit 1
          fi

          # Read index.html and encode
          echo "Uploading index.html..."
          INDEX_B64=$(base64 -w0 dist/index.html)

          # Create deployment
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"files\": {\"index.html\": \"${INDEX_B64}\"}}" \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/pages/projects/${PROJECT}/deployments")

          echo "Deploy response: ${RESP}"
          URL=$(echo "${RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('url','ERROR'))")
          echo "DEPLOY_URL=${URL}" >> $GITHUB_ENV
          echo "SUCCESS: ${URL}"

      - name: Show URL
        run: |
          echo ""
          echo "=========================================="
          echo "Cloudflare Pages URL: ${{ env.DEPLOY_URL }}"
          echo "=========================================="
