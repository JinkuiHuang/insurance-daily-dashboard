    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 48px;
    }
    a { color: inherit; text-decoration: none; }
    .page { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap;
      gap: 12px; margin-bottom: 24px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);

    .badge {
      display: inline-block; background: linear-gradient(135deg, #10b981, #3b82f6);

      gap: 12px;
      margin-bottom: 20px;

      .stats-grid { grid-template-columns: repeat(3, 1fr); }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .stat-card:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

    .stat-card.blue { border-top: 3px solid var(--blue); }

  var grid = document.getElementById('statsGrid');
  for (var i = 0; i < 5; i++) {
    var card = document.createElement('div');
    card.className = 'stat-card ' + colors[i];
    card.innerHTML = '<div class="num">' + nums[i] + '</div><div class="label">' + labels[i] + '</div><div class="hint">' + hints[i] + '</div>';
    grid.appendChild(card);
  }

  // news
  function renderNews(id, list) {
    var el = document.getElementById(id);

    if (!list.length) { el.innerHTML = '<div class="no-data">暂无数据</div>'; return; }

      if (item.hot) tags += '<span class="tag tag-hot">🔥热点</span>';
      if (item.isNew) tags += '<span class="tag tag-new">NEW</span>';
      var div = document.createElement('div');
      div.className = 'news-item';
      div.innerHTML = '<div class="content"><div class="title" title="' + item.title + '">' + tags + item.title + '</div><div class="meta"><span>📰 ' + item.source + '</span><span>🕐 ' + item.time + '</span></div></div>';
      div.onclick = function() { if (item.url) window.open(item.url, '_blank'); };
      el.appendChild(div);
    });
  }

  renderNews('news-health', d.healthNews);
  renderNews('news-agent', d.agentNews);
  renderNews('news-comp', d.compNews);
  renderNews('news-kol', d.kolNews);

  var icons = ['🔍','💰','🤖','🏥','📊'];
  d.insights.forEach(function(item, i) {
    var div = document.createElement('div');
    div.className = 'insight-card';
    div.innerHTML = '<div class="ic-top"><span class="ic-icon">' + icons[i] + '</span><span class="ic-title">' + item.title + '</span></div><div class="ic-desc">' + item.desc + '</div>';
    ig.appendChild(div);
  });

  // tip
  document.getElementById('tip-text').textContent = d.tip;
})();
</script>
</body>
</html>
