  <style>
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --card-hover: #1a2338;
      --border: #1f2d45;
      --green: #10b981;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --orange: #f59e0b;
      --red: #ef4444;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 48px;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Page wrap ── */
    .page { max-width: 1100px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap;
      gap: 12px; margin-bottom: 24px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .badge {
      display: inline-block; background: linear-gradient(135deg, #10b981, #3b82f6);
      color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px;
      padding: 3px 12px; border-radius: 20px; margin-bottom: 10px;
    }
    .header h1 { font-size: 22px; font-weight: 800; line-height: 1.3; }
    .header .sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .header-right { text-align: right; }
    .header-right .date { font-size: 13px; color: var(--text2); }
    .header-right .time { font-size: 22px; font-weight: 700; color: var(--green); margin-top: 4px; }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .stat-card:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card.green { border-top: 3px solid var(--green); }
    .stat-card.blue { border-top: 3px solid var(--blue); }
    .stat-card.purple { border-top: 3px solid var(--purple); }
    .stat-card.orange { border-top: 3px solid var(--orange); }
    .stat-card.red { border-top: 3px solid var(--red); }
    .stat-card .num {
      font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -3px;
      transition: transform 0.15s;
    }
    .stat-card:hover .num { transform: scale(1.06); }
    .stat-card.green .num { color: var(--green); }
    .stat-card.blue .num { color: var(--blue); }
    .stat-card.purple .num { color: var(--purple); }
    .stat-card.orange .num { color: var(--orange); }
    .stat-card.red .num { color: var(--red); }
    .stat-card .label { font-size: 13px; color: var(--text2); margin-top: 8px; }
    .stat-card .hint { font-size: 11px; color: var(--text3); margin-top: 4px; opacity: 0; transition: opacity 0.2s; }
    .stat-card:hover .hint { opacity: 1; }

    /* ── Section list (home) ── */
    .section-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .section-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      cursor: pointer; transition: all 0.15s;
    }
    .section-row:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.2); transform: translateX(4px); }
    .section-row .s-ico {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .s-green .s-ico { background: rgba(16,185,129,0.15); }
    .s-blue .s-ico { background: rgba(59,130,246,0.15); }
    .s-purple .s-ico { background: rgba(139,92,246,0.15); }
    .s-orange .s-ico { background: rgba(245,158,11,0.15); }
    .s-red .s-ico { background: rgba(239,68,68,0.15); }
    .section-row .s-info { flex: 1; min-width: 0; }
    .section-row .s-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .section-row .s-sub { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .section-row .s-count { font-size: 28px; font-weight: 800; flex-shrink: 0; padding-right: 4px; }
    .section-row .s-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; transition: transform 0.15s; }
    .section-row:hover .s-arrow { transform: translateX(4px); color: var(--text2); }
    .section-row.green .s-count { color: var(--green); }
    .section-row.blue .s-count { color: var(--blue); }
    .section-row.purple .s-count { color: var(--purple); }
    .section-row.orange .s-count { color: var(--orange); }
    .section-row.red .s-count { color: var(--red); }

    /* ── Tip cards ── */
    .tip { margin-bottom: 24px; }
    .tip-lb { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .tip-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .tip-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      border-top: 3px solid var(--green);
      transition: border-color 0.2s;
    }
    .tip-card:hover { border-color: rgba(16,185,129,0.35); }
    .tip-card.blue { border-top-color: var(--blue); }
    .tip-card.blue:hover { border-color: rgba(59,130,246,0.35); }
    .tip-card.purple { border-top-color: var(--purple); }
    .tip-card.purple:hover { border-color: rgba(139,92,246,0.35); }
    .tip-card .tc-icon { font-size: 20px; margin-bottom: 8px; }
    .tip-card .tc-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .tip-card .tc-label.green { color: var(--green); }
    .tip-card .tc-label.blue { color: var(--blue); }
    .tip-card .tc-label.purple { color: var(--purple); }
    .tip-card .tc-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
    .tip-card .tc-suggestion {
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text3); line-height: 1.6;
    }
    .tip-card .tc-suggestion strong { color: var(--text2); font-weight: 600; }

    /* ── Footer ── */
    .footer {
      text-align: center; padding-top: 20px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text3); margin-top: 8px;

    .footer a {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text2); padding: 6px 16px; border-radius: 20px;
      font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .footer a:hover { border-color: var(--blue); color: var(--blue); }

       DETAIL PAGE
    ═══════════════════════════════════ */

    .detail-cards { display: flex; flex-direction: column; gap: 12px; }
    .detail-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px; transition: all 0.15s;
    }
    .detail-card:hover { border-color: rgba(255,255,255,0.15); background: var(--card-hover); }
    .detail-card .dc-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }

    .detail-card.green .dc-num { background: rgba(16,185,129,0.15); color: var(--green); }

    .detail-card.red .dc-num { background: rgba(239,68,68,0.15); color: var(--red); }
    .detail-card .dc-title { font-size: 14px; font-weight: 700; line-height: 1.5; flex: 1; }
    .detail-card .dc-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; padding-left: 40px; }
    .detail-card .dc-meta .src { font-size: 11px; font-weight: 700; }

    .detail-card .dc-desc {
      font-size: 13px; color: var(--text2); line-height: 1.7;

      border-radius: 8px; border-left: 3px solid var(--border);

    }
    .detail-card .dc-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding-left: 40px; }
    .detail-card .dc-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; }
    .tag-hot { background: rgba(245,158,11,0.15); color: var(--orange); }
    .tag-new { background: rgba(16,185,129,0.15); color: var(--green); }
    .detail-card .dc-link {
      font-size: 12px; color: var(--blue); text-decoration: none; font-weight: 600;
      display: flex; align-items: center; gap: 4px; transition: opacity 0.15s;
    }
    .detail-card .dc-link:hover { opacity: 0.75; }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 0; color: var(--text3); font-size: 14px; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .tip-cards { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card .num { font-size: 44px; }
      .detail-header { flex-wrap: wrap; gap: 10px; }

    }
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-card { padding: 14px 8px; }
      .stat-card .num { font-size: 36px; }
      .stat-card .label { font-size: 11px; }
    }
  </style>

function startClock() {
  if (_clockTimer) clearInterval(_clockTimer);
  _clockTimer = setInterval(function() {
    var el = document.getElementById('reportTime');
    if (el) el.textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }, 1000);
}
function updateClock() {
  var el = document.getElementById('reportTime');
  if (el) el.textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── Router ──
function getPage() {
  var p = location.search.match(/page=(\w+)/);
  return p ? p[1] : 'home';
}

function navigate(page) {
  if (history.pushState) history.pushState(null, '', '?page=' + page);
  else location.search = '?page=' + page;
  render();
  startClock();
  window.scrollTo(0, 0);
}

window.addEventListener('popstate', function() { render(); window.scrollTo(0,0); });

// ── Render ──
function render() {
  var page = getPage();
  var app = document.getElementById('app');

  if (page === 'home') {
    app.innerHTML = renderHome();
  } else {
    var sec = SECTIONS.find(function(s) { return s.key === page; });
    if (sec) { app.innerHTML = renderDetail(sec); }
    else { app.innerHTML = renderHome(); }
  }
}

// ── Home ──
function renderHome() {
  var dateStr = d.date || new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  var n = [d.stats.n1, d.stats.n2, d.stats.n3, d.stats.n4, d.stats.n5 || d.insights.length];
  var names = ['健康险要闻','三方经代','同业情报','KOL内容','热点发现'];

  var statsHTML = SECTIONS.map(function(s, i) {
    return '<div class="stat-card ' + s.color + '" onclick="navigate(\'' + s.key + '\')" role="button" aria-label="查看' + names[i] + '">' +
      '<div class="num">' + (n[i] || 0) + '</div>' +
      '<div class="label">' + names[i] + '</div>' +
      '<div class="hint">点击查看 →</div></div>';
  }).join('');

  // Parse tip into 3 cards
  var tip = d.tip;
  var tipCards = '';
  if (tip && typeof tip === 'object') {
    var tips3 = [
      { icon: '🏛️', label: '政策导向', color: 'green', text: tip.policy || '', suggest: tip.policySuggest || '' },
      { icon: '💊', label: '产品竞争', color: 'blue', text: tip.product || '', suggest: tip.productSuggest || '' },
      { icon: '🏪', label: '市场格局', color: 'purple', text: tip.market || '', suggest: tip.marketSuggest || '' }
    ];
    tipCards = tips3.map(function(t) {
      return '<div class="tip-card ' + t.color + '">' +
        '<div class="tc-icon">' + t.icon + '</div>' +
        '<div class="tc-label ' + t.color + '">' + t.label + '</div>' +
        '<div class="tc-text">' + escHtml(t.text) + '</div>' +
        (t.suggest ? '<div class="tc-suggestion"><strong>→ </strong>' + escHtml(t.suggest) + '</div>' : '') +
        '</div>';
    }).join('');
  } else if (tip && typeof tip === 'string') {
    // Fallback: try to split by semicolons (policy; product; market)
    var parts = tip.split('；');
    if (parts.length < 3) parts = tip.split(';');
    var defaultLabels = ['🏛️ 政策', '💊 产品', '🏪 市场'];
    var defaultColors = ['green', 'blue', 'purple'];
    tipCards = parts.slice(0, 3).map(function(p, i) {
      var suggest = '';
      var text = p.trim();
      if (text.indexOf('建议') >= 0) {
        var idx = text.indexOf('建议');
        suggest = text.slice(idx);
        text = text.slice(0, idx);
      }
      return '<div class="tip-card ' + defaultColors[i] + '">' +
        '<div class="tc-icon">' + defaultLabels[i].split(' ')[0] + '</div>' +
        '<div class="tc-label ' + defaultColors[i] + '">' + defaultLabels[i].split(' ')[1] + '</div>' +
        '<div class="tc-text">' + escHtml(text.replace(/^(政策层面|产品层面|市场层面)：?/, '')) + '</div>' +
        (suggest ? '<div class="tc-suggestion"><strong>→ </strong>' + escHtml(suggest) + '</div>' : '') +
        '</div>';
    }).join('');
  }
  if (!tipCards) {
    tipCards = '<div class="tip-card green" style="grid-column:1/-1"><div class="tc-text">暂无点评</div></div>';
  }

  return '<div class="header">' +
    '<div><div class="badge">📋 每日报告</div><h1>保险经代行业日报</h1><div class="sub">健康险 · 三方经代 · 同业情报 · KOL · 热点分析</div></div>' +
    '<div class="header-right"><div class="date">' + escHtml(dateStr) + '</div><div class="time" id="reportTime"></div></div></div>' +
    '<div class="stats-grid">' + statsHTML + '</div>' +
    '<div class="tip"><div class="tip-lb">💡 今日要点</div><div class="tip-cards">' + tipCards + '</div></div>' +
    '<div class="footer"><a href="javascript:location.reload()">🔄 刷新数据</a><div style="margin-top:10px;">数据来源：公开网络信息 · MaxClaw AI 整理 · 仅供参考</div></div>';
}

// ── Detail ──
function renderDetail(sec) {
  var items = d[sec.dataKey] || [];
  var color = sec.color;
  var dateStr = d.date || now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  var cardsHTML = items.length ? items.map(function(item, i) {
    var tags = '';
    if (item.hot) tags += '<span class="tag tag-hot">🔥 热点</span>';
    if (item.isNew) tags += '<span class="tag tag-new">新</span>';
    var descHTML = item.desc ? '<div class="dc-desc">' + escHtml(item.desc) + '</div>' : '';
    var linkHTML = item.url ? '<a class="dc-link" href="' + escAttr(item.url) + '" target="_blank" rel="noopener">详情 →</a>' : '';
    var metaHTML = (item.source || item.time) ?
      '<div class="dc-meta"><span class="src" style="color:var(--' + color + ')">' + escHtml(item.source || '') + '</span><span class="tm">' + escHtml(item.time || '') + '</span></div>' : '';
    return '<div class="detail-card ' + color + '">' +
      '<div class="dc-top">' +
        '<div class="dc-num">' + (i+1) + '</div>' +
        '<div class="dc-title">' + escHtml(item.title) + '</div></div>' +
      metaHTML + descHTML +
      '<div class="dc-footer">' +
        '<div class="dc-tags">' + tags + '</div>' + linkHTML + '</div></div>';
  }).join('') : '<div class="empty-state">暂无内容</div>';

  return '<div class="header">' +
    '<div><div class="badge">📋 每日报告</div><h1>保险经代行业日报</h1><div class="sub">健康险 · 三方经代 · 同业情报 · KOL · 热点分析</div></div>' +
    '<div class="header-right"><div class="date">' + escHtml(dateStr) + '</div><div class=\"time\" id=\"reportTime\"></div></div></div>' +
    '<div class="detail-header ' + color + '">' +
      '<div class="back-btn" onclick="navigate(\'home\')" role="button"><span class="arrow">←</span>返回</div>' +
      '<div class="s-ico">' + sec.label.split(' ')[0] + '</div>' +
      '<div class="info"><div class="name">' + sec.label + '</div><div class="sub">' + sec.sub + '</div></div>' +
      '<div class="count-badge">' + items.length + ' 条</div></div>' +
    '<div class="detail-cards">' + cardsHTML + '</div>' +
    '<div class="footer" style="margin-top:24px"><a href="javascript:location.reload()">🔄 刷新数据</a><div style="margin-top:10px;">数据来源：公开网络信息 · MaxClaw AI 整理 · 仅供参考</div></div>';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

render();
startClock();
</script>
</body>
</html>
