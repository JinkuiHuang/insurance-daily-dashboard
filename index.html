    const tags = (item.hot ? '<span class=tag tag-hot>🔥 热点</span>' : '') + (item.isNew ? '<span class=tag tag-new>🆕 新</span>' : '');
    return '<div class=news-item onclick="window.open(\'' + item.url + '\',\'_blank\')">' +
      tags + '<div class=content><div class=title>' + item.title + '</div><div class=meta><span>' + item.source + '</span><span>' + item.time + '</span></div></div></div>';
  }).join('');
}
function renderInsights(insights) {
  const el = document.getElementById('insights-grid');
  if (!insights || insights.length === 0) { el.innerHTML = '<div class=no-data>暂无数据</div>'; return; }
  el.innerHTML = insights.map(i =>
    '<div class=insight-card><div class=ic-top><span class=ic-icon>' + i.icon + '</span><span class=ic-title>' + i.title + '</span></div><div class=ic-desc>' + i.desc + '</div></div>'
  ).join('');
}
init();
</script>
</body>
</html>
