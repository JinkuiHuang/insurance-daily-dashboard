<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保险经代行业日报</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --card-hover: #1a2338;
      --border: #1f2d45;
      --green: #10b981;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --orange: #f59e0b;
      --red: #ef4444;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 48px;
    }
    a { color: inherit; text-decoration: none; }
    .page { max-width: 1100px; margin: 0 auto; }
    .header {
      display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap;
      gap: 12px; margin-bottom: 24px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .badge {
      display: inline-block; background: linear-gradient(135deg, #10b981, #3b82f6);
      color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px;
      padding: 3px 12px; border-radius: 20px; margin-bottom: 10px;
    }
    .header h1 { font-size: 22px; font-weight: 800; line-height: 1.3; }
    .header .sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .header-right { text-align: right; }
    .header-right .date { font-size: 13px; color: var(--text2); }
    .header-right .time { font-size: 22px; font-weight: 700; color: var(--green); margin-top: 4px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .stat-card:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .stat-card.green { border-top: 3px solid var(--green); }
    .stat-card.blue { border-top: 3px solid var(--blue); }
    .stat-card.purple { border-top: 3px solid var(--purple); }
    .stat-card.orange { border-top: 3px solid var(--orange); }
    .stat-card.red { border-top: 3px solid var(--red); }
    .stat-card .num { font-size: 52px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
    .stat-card:hover .num { transform: scale(1.06); }
    .stat-card.green .num { color: var(--green); }
    .stat-card.blue .num { color: var(--blue); }
    .stat-card.purple .num { color: var(--purple); }
    .stat-card.orange .num { color: var(--orange); }
    .stat-card.red .num { color: var(--red); }
    .stat-card .label { font-size: 13px; color: var(--text2); margin-top: 8px; }
    .stat-card .hint { font-size: 11px; color: var(--text3); margin-top: 4px; opacity: 0; transition: opacity 0.2s; }
    .stat-card:hover .hint { opacity: 1; }
    .news-section { margin-bottom: 24px; }
    .section-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .section-header .sh-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .section-header h2 { font-size: 15px; font-weight: 700; flex: 1; }
    .section-header .count {
      background: rgba(255,255,255,0.08); border-radius: 20px;
      padding: 2px 10px; font-size: 12px; color: var(--text2);
    }
    .news-list { display: flex; flex-direction: column; gap: 8px; }
    .news-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex; align-items: flex-start; gap: 10px;
      transition: all 0.15s;
      cursor: pointer;
    }
    .news-item:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.2); transform: translateX(3px); }
    .news-item .tag {
      flex-shrink: 0; padding: 2px 7px; border-radius: 5px;
      font-size: 10px; font-weight: 700; margin-top: 2px;
    }
    .tag-new { background: rgba(16,185,129,0.2); color: var(--green); }
    .tag-hot { background: rgba(239,68,68,0.2); color: var(--red); }
    .news-item .content { flex: 1; min-width: 0; }
    .news-item .title {
      font-size: 13px; font-weight: 600; line-height: 1.5;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .news-item .meta { font-size: 11px; color: var(--text3); margin-top: 4px; }
    .news-item .meta span { margin-right: 12px; }
    .insights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    @media (max-width: 700px) {
      .insights-grid { grid-template-columns: 1fr; }
    }
    .insight-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      transition: all 0.15s;
    }
    .insight-card:hover { background: var(--card-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
    .insight-card .ic-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .insight-card .ic-icon { font-size: 18px; }
    .insight-card .ic-title { font-size: 13px; font-weight: 700; }
    .insight-card .ic-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }
    .tip-box {
      background: linear-gradient(135deg, rgba(16,185,129,0.12), rgba(59,130,246,0.12));
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 24px;
    }
    .tip-box .tip-title { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
    .tip-box .tip-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
    .footer {
      text-align: center; padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text3);
    }
    .no-data { text-align: center; padding: 20px; color: var(--text3); font-size: 13px; }
    [data-cat="health"] .sh-icon { background: rgba(16,185,129,0.15); }
    [data-cat="agent"] .sh-icon { background: rgba(59,130,246,0.15); }
    [data-cat="comp"] .sh-icon { background: rgba(245,158,11,0.15); }
    [data-cat="kol"] .sh-icon { background: rgba(139,92,246,0.15); }
    [data-cat="insight"] .sh-icon { background: rgba(239,68,68,0.15); }
  </style>

<script>
(function() {
  var d = DASHBOARD_DATA;
  // date/time
  var parts = d.date.match(/(\d+)年(\d+)月(\d+)日/);
  document.getElementById('reportDate').textContent = parts[1] + '年' + parts[2] + '月' + parts[3] + '日';
  var now = new Date();
  document.getElementById('reportTime').textContent = now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});

  // stats
  var colors = ['green','blue','purple','orange','red'];
  var labels = ['健康险要闻','三方经代','同业竞品','KOL内容','热点洞察'];
  var hints = ['点击查看详情','点击查看详情','点击查看详情','点击查看详情','点击查看详情'];
  var nums = [d.stats.n1, d.stats.n2, d.stats.n3, d.stats.n4, d.insights.length];
  var grid = document.getElementById('statsGrid');
  for (var i = 0; i < 5; i++) {
    var card = document.createElement('div');
    card.className = 'stat-card ' + colors[i];
    card.innerHTML = '<div class="num">' + nums[i] + '</div><div class="label">' + labels[i] + '</div><div class="hint">' + hints[i] + '</div>';
    grid.appendChild(card);
  }

  // news
  function renderNews(id, list) {
    var el = document.getElementById(id);
    document.getElementById('count-' + id.replace('news-','')).textContent = list.length + ' 条';
    if (!list.length) { el.innerHTML = '<div class="no-data">暂无数据</div>'; return; }
    list.forEach(function(item) {
      var tags = '';
      if (item.hot) tags += '<span class="tag tag-hot">🔥热点</span>';
      if (item.isNew) tags += '<span class="tag tag-new">NEW</span>';
      var div = document.createElement('div');
      div.className = 'news-item';
      div.innerHTML = '<div class="content"><div class="title" title="' + item.title + '">' + tags + item.title + '</div><div class="meta"><span>📰 ' + item.source + '</span><span>🕐 ' + item.time + '</span></div></div>';
      div.onclick = function() { if (item.url) window.open(item.url, '_blank'); };
      el.appendChild(div);
    });
  }

  renderNews('news-health', d.healthNews);
  renderNews('news-agent', d.agentNews);
  renderNews('news-comp', d.compNews);
  renderNews('news-kol', d.kolNews);

  // insights
  var ig = document.getElementById('insights-grid');
  document.getElementById('count-insight').textContent = d.insights.length + ' 条';
  var icons = ['🔍','💰','🤖','🏥','📊'];
  d.insights.forEach(function(item, i) {
    var div = document.createElement('div');
    div.className = 'insight-card';
    div.innerHTML = '<div class="ic-top"><span class="ic-icon">' + icons[i] + '</span><span class="ic-title">' + item.title + '</span></div><div class="ic-desc">' + item.desc + '</div>';
    ig.appendChild(div);
  });

  // tip
  document.getElementById('tip-text').textContent = d.tip;
})();
</script>
</body>
</html>
