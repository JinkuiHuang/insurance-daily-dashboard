      padding: 20px 16px 48px;
    }
    a { color: inherit; text-decoration: none; }

    .page { max-width: 1100px; margin: 0 auto; }

    .header {
      display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap;
      gap: 12px; margin-bottom: 24px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .badge {
      display: inline-block; background: linear-gradient(135deg, #10b981, #3b82f6);
      color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px;
      padding: 3px 12px; border-radius: 20px; margin-bottom: 10px;

    .header h1 { font-size: 22px; font-weight: 800; line-height: 1.3; }
    .header .sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .header-right { text-align: right; }
    .header-right .date { font-size: 13px; color: var(--text2); }
    .header-right .time { font-size: 22px; font-weight: 700; color: var(--green); margin-top: 4px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .stat-card:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .stat-card:hover::before { opacity: 1; }
    .stat-card.green { border-top: 3px solid var(--green); }
    .stat-card.blue { border-top: 3px solid var(--blue); }
    .stat-card.purple { border-top: 3px solid var(--purple); }
    .stat-card.orange { border-top: 3px solid var(--orange); }
    .stat-card.red { border-top: 3px solid var(--red); }
    .stat-card .num {
      font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -3px;
      transition: transform 0.15s;
    }
    .stat-card:hover .num { transform: scale(1.06); }
    .stat-card.green .num { color: var(--green); }
    .stat-card.blue .num { color: var(--blue); }
    .stat-card.purple .num { color: var(--purple); }
    .stat-card.orange .num { color: var(--orange); }
    .stat-card.red .num { color: var(--red); }
    .stat-card .label { font-size: 13px; color: var(--text2); margin-top: 8px; }
    .stat-card .hint { font-size: 11px; color: var(--text3); margin-top: 4px; opacity: 0; transition: opacity 0.2s; }
    .stat-card:hover .hint { opacity: 1; }

    .section-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
    .section-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      cursor: pointer; transition: all 0.15s;
    }
    .section-row:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.2); transform: translateX(4px); }
    .section-row .s-ico {

      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;

    .s-purple .s-ico { background: rgba(139,92,246,0.15); }
    .s-orange .s-ico { background: rgba(245,158,11,0.15); }

    .insight-card {

// Insights
const insightsWrap = document.getElementById('insightsWrap');
insightsWrap.innerHTML = '<h2 style="font-size:14px;color:#f59e0b;margin-bottom:10px;font-weight:700;">💡 热点发现 & 行业分析</h2>' +
  DASHBOARD_DATA.insights.map(i => `<div class="insight-card">
    <span class="tag">${i.tag}</span>
    <div class="txt">${i.text}</div>
  </div>`).join('');

// Tip
document.getElementById('tipWrap').innerHTML =
  `<div class="tip-title">💬 今日点评</div><div class="tip-text">${DASHBOARD_DATA.tip}</div>`;

// Detail panels
const panels = document.getElementById('detailPanels');
sectionMap.forEach(s => {
  const div = document.createElement('div');
  div.className = 'detail';
  div.id = 'panel-' + s.key;
  div.innerHTML = `<button class="back-btn" onclick="hideAll()">← 返回概览</button>
    <h2>${s.icon} ${s.label}</h2>` +
    DASHBOARD_DATA[s.key].map((item, idx) => `
    <div class="news-item">
      <div class="ni-num">${idx+1}.</div>
      <div class="ni-body">
        <div class="ni-title">${item.hot?'<span class="ni-hot">🔥</span> ':''}${item.isNew?'<span class="ni-new">NEW</span> ':''}<a href="${item.url}" target="_blank">${item.title}</a></div>
        <div class="ni-meta"><span>📌 ${item.source}</span><span>🕐 ${item.time}</span></div>
      </div>
    </div>`).join('');
  panels.appendChild(div);
});

function showSection(key) {
  hideAll();
  document.getElementById('panel-' + key).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function hideAll() {
  document.querySelectorAll('.detail').forEach(d => d.classList.remove('active'));
}
</script>
</body>
</html>
